name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Bundle size check
        run: pnpm size

      - name: Publish checks (publint + arethetypeswrong)
        run: pnpm check:publish

  compat-react-18:
    name: Compat (React 18)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install with React 18 override
        run: |
          pnpm install --no-frozen-lockfile \
            --config.overrides.react=^18.3.0 \
            --config.overrides.react-dom=^18.3.0 \
            --config.overrides.@types/react=^18.3.0 \
            --config.overrides.@types/react-dom=^18.3.0

      # Build before test — the react-hook-form test suite imports
      # @react-ai-form/react via its published entry point, so dist/
      # needs to exist. The main matrix happens to build implicitly
      # (typecheck → ^build in turbo), but this job skips typecheck.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
